name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lacrei_db
          POSTGRES_USER: lacrei_user
          POSTGRES_PASSWORD: lacrei_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-insecure-chave-ci-123456
      DEBUG: "True"
      DB_NAME: lacrei_db
      DB_USER: lacrei_user
      DB_PASSWORD: lacrei_pass
      DB_HOST: localhost
      DB_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Poetry
        uses: snok/install-poetry@v1

      - name: Instalar dependências
        run: poetry install --no-root

      - name: Lint com flake8
        run: |
          poetry run pip install flake8
          poetry run flake8 . --max-line-length=120 --exclude=migrations,__pycache__,admin.py

      - name: Rodar testes
        run: poetry run python manage.py test

      - name: Build Docker
        run: docker compose build